<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Conversor Unidades</title>
<style>
html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none;-webkit-text-size-adjust:100%;touch-action:manipulation}
:root{--safe-bottom:env(safe-area-inset-bottom);} 
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Arial,sans-serif}
body{background:#111;color:#fff;display:flex;flex-direction:column;height:100dvh;min-height:100dvh;max-height:100dvh;overflow:hidden;padding-bottom:var(--safe-bottom);} 
.display{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8px;text-align:center;padding-top:72px}
.currentInput{font-size:1.8rem;min-height:2.2rem;margin-bottom:6px}
.breakdown{font-size:.95rem;line-height:1.3rem;margin-bottom:6px;max-height:16vh;overflow:hidden}

.topbar{position:fixed;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;align-items:center;z-index:50}
.menuBtn{background:#555;padding:10px 12px;border-radius:10px;font-size:1rem;display:flex;gap:8px;align-items:center}
.menuBtn:active{background:#666}
.menuLabel{opacity:.9;font-size:.95rem}
.menu{position:absolute;top:52px;left:0;background:#1b1b1b;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;min-width:180px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:none;z-index:10}
.menu.open{display:block}
.menu button{width:100%;text-align:left;border-radius:0;background:transparent;padding:12px}
.menu button:hover{background:#2a2a2a}
.menu button.active{background:#333}

/* Carousel selector con resultado integrado */
.carousel{grid-column:1/4;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.carousel button{flex:0 0 auto;background:#0066cc;font-size:1.2rem;padding:14px 16px}
.carousel button:active{background:#004a99}
.carouselLabel{
  flex:1;
  text-align:center;
  font-weight:bold;
  font-size:clamp(1.6rem,6.2vw,2.2rem);
  letter-spacing:.5px;
}

.keyboard{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;padding-bottom:calc(8px + var(--safe-bottom));} 
button{font-size:clamp(.95rem,3.5vw,1rem);padding:clamp(10px,2.8vw,12px);border:none;border-radius:10px;background:#333;color:#fff;touch-action:manipulation}
button:active{background:#555}
.actions{grid-column:1/4;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.units{grid-column:1/4;display:flex;gap:6px;flex-wrap:nowrap}
.units button{flex:1}
.units.input button{background:#2e7d32}
.units.input button.active{background:#1b5e20}

.resetTopBtn{background:#444;padding:10px 14px;border-radius:10px;font-size:1.2rem}
.resetTopBtn:active{background:#666}
.resetTopBtn.confirm{background:#ff9800}
</style>
</head>
<body>

<div class="display">
  <div class="topbar">
    <button class="menuBtn" id="systemMenuBtn" aria-haspopup="true" aria-expanded="false">
      ☰ <span class="menuLabel" id="systemMenuLabel">metros</span>
    </button>
    <button class="resetTopBtn" id="resetTopBtn" title="Reiniciar datos (mantiene la unidad)">⟳</button>
    <div class="menu" id="systemMenu" role="menu" aria-label="Seleccionar magnitud"></div>
  </div>
  <div class="currentInput" id="currentInput"></div>
  <div class="breakdown" id="breakdown"></div>
</div>

<div class="keyboard" id="keyboard"></div>

<script>
// --- Anti-zoom / anti-scroll (móvil) ---
// Bloquea pinch-zoom (iOS Safari) y doble-tap zoom residual.
document.addEventListener('gesturestart', (e)=>e.preventDefault());
document.addEventListener('gesturechange', (e)=>e.preventDefault());
document.addEventListener('gestureend', (e)=>e.preventDefault());
// Nota: eliminamos el bloqueo global de touchmove porque en iOS
// puede interferir con el cálculo dinámico de la barra inferior.


const prefixes=["k","h","da","","d","c","m"];
const prefixFactors={k:1000,h:100,da:10,"":1,d:0.1,c:0.01,m:0.001};
const baseUnits={metros:"m",gramos:"g",litros:"l"};

let currentSystem="metros";
let entries=[];
let currentNumber="";
let currentInputPrefix="";
let currentResultIndex=prefixes.indexOf("");
let resetArmed=false;

const keyboard=document.getElementById("keyboard");
const systemMenuBtn=document.getElementById("systemMenuBtn");
const systemMenuLabel=document.getElementById("systemMenuLabel");
const systemMenu=document.getElementById("systemMenu");
const resetTopBtn=document.getElementById("resetTopBtn");
const currentInputEl=document.getElementById("currentInput");
const breakdownEl=document.getElementById("breakdown");

function formatNumber(num){
  return num.toLocaleString('es-ES',{useGrouping:true,minimumFractionDigits:0,maximumFractionDigits:10});
}

function convertToBase(){
  return entries.reduce((sum,e)=>sum+e.value*prefixFactors[e.prefix],0);
}

function getCurrentResultPrefix(){
  return prefixes[currentResultIndex] || "";
}

function updateDisplay(){
  currentInputEl.textContent=currentNumber;

  const order=[...prefixes];
  const ordered=[...entries].sort((a,b)=>order.indexOf(a.prefix)-order.indexOf(b.prefix));
  breakdownEl.innerHTML=ordered.map(e=>`${formatNumber(e.value)} ${e.prefix}${baseUnits[currentSystem]}`).join("<br>");

  const total=convertToBase();
  const resultPrefix=getCurrentResultPrefix();
  const value=total/prefixFactors[resultPrefix];
  const resultUnit=resultPrefix+baseUnits[currentSystem];

  const label=document.getElementById("carouselLabel");
  if(label) label.textContent=`${formatNumber(value)} ${resultUnit}`;

  document.querySelectorAll(".units.input button").forEach(b=>{
    b.classList.toggle("active", b.dataset.prefix===currentInputPrefix);
  });

  systemMenuLabel.textContent=currentSystem;

  document.querySelectorAll("#systemMenu button").forEach(b=>{
    b.classList.toggle("active", b.dataset.system===currentSystem);
  });
}

function addNumber(n){currentNumber+=n;updateDisplay();}
function addComma(){if(!currentNumber.includes(",")){if(currentNumber==="")currentNumber="0";currentNumber+=",";updateDisplay();}}
function back(){currentNumber=currentNumber.slice(0,-1);updateDisplay();}
function addUnit(prefix){
  if(currentNumber==="")return;
  const value=parseFloat(currentNumber.replace(",","."));
  if(isNaN(value))return;
  entries.push({value,prefix});
  currentNumber="";
  updateDisplay();
}

function resetAll(){
  entries=[];
  currentNumber="";
  currentInputPrefix="";
  currentResultIndex=prefixes.indexOf("");
  updateDisplay();
}

function armReset(){
  resetArmed=true;
  resetTopBtn.classList.add("confirm");
}

function disarmReset(){
  resetArmed=false;
  resetTopBtn.classList.remove("confirm");
}

function onResetClick(e){
  e.stopPropagation();
  if(!resetArmed){
    armReset();
    return;
  }
  // Segunda pulsación: reiniciar
  resetAll();
  disarmReset();
}

function prevResultUnit(){
  currentResultIndex=(currentResultIndex-1+prefixes.length)%prefixes.length;
  updateDisplay();
}

function nextResultUnit(){
  currentResultIndex=(currentResultIndex+1)%prefixes.length;
  updateDisplay();
}

function toggleSystemMenu(force){
  const next = typeof force === "boolean" ? force : !systemMenu.classList.contains("open");
  systemMenu.classList.toggle("open", next);
  systemMenuBtn.setAttribute("aria-expanded", next ? "true" : "false");
}

function setSystem(sys){
  currentSystem=sys;
  buildKeyboard();
  toggleSystemMenu(false);
  updateDisplay();
}

function buildSystemSelector(){
  systemMenu.innerHTML="";
  Object.keys(baseUnits).forEach(sys=>{
    const b=document.createElement("button");
    b.type="button";
    b.textContent=sys;
    b.dataset.system=sys;
    b.onclick=()=>setSystem(sys);
    systemMenu.appendChild(b);
  });
}

systemMenuBtn.addEventListener("click", (e)=>{
  // Cualquier otra acción cancela el reinicio armado
  if(resetArmed) disarmReset();
  e.stopPropagation();
  toggleSystemMenu();
});

document.addEventListener("click", ()=>{
  // Click fuera: cierra menú y también cancela confirmación de reinicio
  toggleSystemMenu(false);
  if(resetArmed) disarmReset();
});
systemMenu.addEventListener("click", (e)=>e.stopPropagation());

document.addEventListener("keydown", (e)=>{
  if(e.key==="Escape"){
    toggleSystemMenu(false);
    if(resetArmed) disarmReset();
    return;
  }
  // Si el reinicio está armado y el usuario escribe/toca teclas, lo desarmamos.
  if(resetArmed) disarmReset();
});

function buildKeyboard(){
  keyboard.innerHTML="";

  const carousel=document.createElement("div");
  carousel.className="carousel";

  const leftBtn=document.createElement("button");
  leftBtn.textContent="◀";
  leftBtn.onclick=()=>{ if(resetArmed) disarmReset(); prevResultUnit(); };

  const label=document.createElement("div");
  label.id="carouselLabel";
  label.className="carouselLabel";

  const rightBtn=document.createElement("button");
  rightBtn.textContent="▶";
  rightBtn.onclick=()=>{ if(resetArmed) disarmReset(); nextResultUnit(); };

  carousel.appendChild(leftBtn);
  carousel.appendChild(label);
  carousel.appendChild(rightBtn);
  keyboard.appendChild(carousel);

  for(let i=1;i<=9;i++){
    const b=document.createElement("button");
    b.textContent=i;
    b.onclick=()=>{ if(resetArmed) disarmReset(); addNumber(i); };
    keyboard.appendChild(b);
  }

  const actions=document.createElement("div");
  actions.className="actions";

  const comma=document.createElement("button");
  comma.textContent=",";
  comma.onclick=()=>{ if(resetArmed) disarmReset(); addComma(); };

  const zero=document.createElement("button");
  zero.textContent="0";
  zero.onclick=()=>{ if(resetArmed) disarmReset(); addNumber(0); };

  const backBtn=document.createElement("button");
  backBtn.textContent="⌫";
  backBtn.onclick=()=>{ if(resetArmed) disarmReset(); back(); };

  actions.appendChild(comma);
  actions.appendChild(zero);
  actions.appendChild(backBtn);
  keyboard.appendChild(actions);

  const inputRow=document.createElement("div");
  inputRow.className="units input";
  prefixes.forEach(p=>{
    const b=document.createElement("button");
    b.textContent=p+baseUnits[currentSystem];
    b.dataset.prefix=p;
    b.onclick=()=>{
      if(resetArmed) disarmReset();
      currentInputPrefix=p;
      if(currentNumber!="") addUnit(p);
      updateDisplay();
    };
    inputRow.appendChild(b);
  });
  keyboard.appendChild(inputRow);
}

resetTopBtn.addEventListener("click", onResetClick);

buildSystemSelector();
buildKeyboard();
updateDisplay();
</script>
</body>
</html>
